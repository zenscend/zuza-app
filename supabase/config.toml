[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/api/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

# Configure Resend as SMTP provider in your Supabase project settings:
# Settings > Authentication > SMTP Settings
# Host: smtp.resend.com
# Port: 465
# Username: resend
# Password: your-resend-api-key
# Sender name: Zuza
# Sender email: noreply@zuzatech.com

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # Set to true in production

[auth.external.google]
enabled = true
# client_id = env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)
# secret = env(SUPABASE_AUTH_GOOGLE_SECRET)
# redirect_uri = "http://localhost:54321/auth/v1/callback"
